<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#08111f"><link rel="manifest" href="/manifest.json"><title>Lisa 台股即時決策助手 V3</title><style>
body{margin:0;background:#08111f;color:#f7f9ff;font-family:-apple-system,sans-serif}header{padding:15px;position:sticky;top:0;background:#08111fee;border-bottom:1px solid #263653}h1{font-size:20px;margin:0}.sub{color:#9eabc3;font-size:12px}main{padding:10px;max-width:900px;margin:auto}.panel,.card{background:#111d30;border:1px solid #263653;border-radius:16px;padding:12px;margin-bottom:10px}.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px}button,select,input{background:#0a1527;color:white;border:1px solid #354767;border-radius:10px;padding:10px;width:100%;box-sizing:border-box}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:10px}.row{display:flex;justify-content:space-between;align-items:center}.sym{font-size:21px;font-weight:900}.price{font-size:31px;font-weight:900;margin:8px 0}.badge{font-weight:900;padding:6px 9px;border-radius:999px;background:#665017}.good{background:#15553f}.bad{background:#6a2a38}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.metric{background:#0a1527;border-radius:9px;padding:7px;text-align:center;font-size:12px}.reason{font-size:14px;line-height:1.55;margin-top:9px}.levels{font-size:13px;color:#c6d1e7;margin-top:7px}.status{grid-column:1/-1;font-size:13px;background:#0a1527;padding:9px;border-radius:10px}
</style></head><body><header><h1>Lisa 台股即時決策助手 V3</h1><div class="sub">Fugle 行情｜iPhone PWA｜進・等・抱・撤・停利・停損</div></header><main><section class="panel controls"><select id="market" onchange="render()"><option value="1">大盤偏多</option><option value="0" selected>大盤中性</option><option value="-1">大盤偏空</option></select><select id="sector" onchange="render()"><option value="1">族群偏強</option><option value="0" selected>族群中性</option><option value="-1">族群偏弱</option></select><button onclick="refreshAll()">立即更新</button><button onclick="render()">重新判斷</button><div class="status" id="status">正在連線 Fugle…</div></section><div id="grid" class="grid"></div></main>
<script>
const stocks=[["2327","國巨","被動元件"],["3037","欣興","PCB"],["3706","神達","AI伺服器"],["3006","晶豪科","記憶體"],["2313","華通","PCB"],["6147","頎邦","封測"]];
let db=JSON.parse(localStorage.getItem("LisaV3")||"{}");stocks.forEach(z=>db[z[0]]??={price:0,prev:0,high:0,low:0,volume:0,cost:z[0]=="2327"?801:0,ticks:[]});
function sma(a,n){return a.length<n?null:a.slice(-n).reduce((s,x)=>s+x,0)/n}
function bars(ticks,min){let m=new Map();ticks.forEach(t=>{let k=Math.floor(t.ts/(min*60000))*min*60000;if(!m.has(k))m.set(k,{o:t.p,h:t.p,l:t.p,c:t.p,v:0});let b=m.get(k);b.h=Math.max(b.h,t.p);b.l=Math.min(b.l,t.p);b.c=t.p;b.v+=t.v||0});return [...m.values()]}
function kd(bs){if(bs.length<9)return null;let a=bs.slice(-9),h=Math.max(...a.map(x=>x.h)),l=Math.min(...a.map(x=>x.l));return h==l?50:(a.at(-1).c-l)/(h-l)*100}
function ingest(q){let x=db[q.symbol];if(!x||!isFinite(+q.price))return;x.price=+q.price;x.prev=+q.previousClose||x.prev;x.high=+q.high||Math.max(x.high||0,x.price);x.low=+q.low||(x.low?Math.min(x.low,x.price):x.price);x.volume=+q.volume||x.volume;x.ticks.push({ts:+q.timestamp||Date.now(),p:x.price,v:+q.lastSize||0});if(x.ticks.length>6000)x.ticks=x.ticks.slice(-6000)}
function decide(z){let x=db[z[0]],p=x.price,b=bars(x.ticks,1),score=0,r=[];if(!p)return {t:"等",cl:"",r:"等待 Fugle 行情。",stop:"—",target:"—",k:null,b1:0,b5:0};let c=b.map(v=>v.c),m3=sma(c,3),m10=sma(c,10),m20=sma(c,20),k=kd(b);if(+market.value>0){score++;r.push("大盤偏多")}if(+market.value<0){score--;r.push("大盤偏空")}if(+sector.value>0){score++;r.push("族群偏強")}if(+sector.value<0){score--;r.push("族群偏弱")}if(m3&&m10&&p>m3&&m3>m10){score+=2;r.push("站回短均線")}if(m20&&p<m20){score--;r.push("仍在20MA下")}if(x.low&&p>=x.low*1.008){score++;r.push("急殺後收復")}if(k!==null&&k>80){score--;r.push("KD高檔勿追")}if(z[0]=="3006"&&x.prev&&(p-x.prev)/x.prev>.05){score--;r.push("晶豪科急漲避免追高")}if(x.cost&&(p-x.cost)/x.cost<-.012){score-=2;r.push("跌離成本")}let t="抱／觀察",cl="";if(score>=4){t="進／可進";cl="good"}else if(score>=2){t="試單";cl="good"}else if(score<=-3){t="撤／停損";cl="bad"}else if(score<=-1){t="警戒／不追";cl="bad"}return {t,cl,r:r.join("；")||"訊號中性，等低點墊高或帶量突破。",stop:(p*.992).toFixed(1),target:Math.max(p*1.01,x.high||0).toFixed(1),k,b1:b.length,b5:bars(x.ticks,5).length}}
function render(){grid.innerHTML="";stocks.forEach(z=>{let x=db[z[0]],d=decide(z),pnl=x.cost&&x.price?((x.price-x.cost)/x.cost*100).toFixed(2):"—";grid.innerHTML+=`<section class="card"><div class="row"><div><span class="sym">${z[0]} ${z[1]}</span><div class="sub">${z[2]}</div></div><span class="badge ${d.cl}">${d.t}</span></div><div class="row"><div class="price">${x.price||"—"}</div><div class="sub">成本 <input style="width:80px;padding:5px" type="number" step=".1" value="${x.cost}" onchange="db['${z[0]}'].cost=+this.value;render()"><br>損益 ${pnl}${pnl=="—"?"":"%"}</div></div><div class="metrics"><div class="metric">1分K<br><b>${d.b1}</b></div><div class="metric">5分K<br><b>${d.b5}</b></div><div class="metric">KD9<br><b>${d.k==null?"—":d.k.toFixed(1)}</b></div><div class="metric">成交量<br><b>${x.volume||"—"}</b></div></div><div class="reason">${d.r}</div><div class="levels">防守 ${d.stop}｜第一目標 ${d.target}｜高/低 ${x.high||"—"}/${x.low||"—"}</div></section>`});localStorage.setItem("LisaV3",JSON.stringify(db))}
async function refreshAll(){status.textContent="正在更新 Fugle 行情…";try{let r=await fetch("/api/quotes"),j=await r.json();if(!r.ok)throw Error(j.error||"連線失敗");j.data.forEach(ingest);render();status.textContent="Fugle 已連線｜"+new Date().toLocaleTimeString()}catch(e){status.textContent="尚未連線："+e.message}}
render();refreshAll();setInterval(refreshAll,5000);if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");
</script></body></html>
